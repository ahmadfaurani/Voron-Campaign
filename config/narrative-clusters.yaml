# Narrative Correlation Matrix
# Positive = narratives rise together, Negative = competitive
correlations:
  - narrative_a: "NAR-01"
    narrative_b: "NAR-06"
    correlation: 0.73
    type: "positive"
    description: "PKR Crisis triggers PKR Unity response"
  
  - narrative_a: "NAR-02"
    narrative_b: "NAR-08"
    correlation: 0.85
    type: "positive"
    description: "BERSAMA Movement reinforces BERSAMA Growth"
  
  - narrative_a: "NAR-02"
    narrative_b: "NAR-04"
    correlation: -0.62
    type: "negative"
    description: "BERSAMA growth perceived as threat to BN Johor"
  
  - narrative_a: "NAR-01"
    narrative_b: "NAR-09"
    correlation: -0.55
    type: "negative"
    description: "PKR instability weakens PH Pact narrative"

# Lifecycle Stage Definitions
lifecycle_stages:
  emergence:
    description: "First mentions, <3 sources"
    velocity_range: [100, 500]  # % increase
    action: "Monitor closely"
  
  growth:
    description: "Rapid spread, 3-5 sources"
    velocity_range: [20, 100]
    action: "Track daily"
  
  peak:
    description: "Maximum coverage, 6-7 sources"
    velocity_range: [-10, 20]
    action: "Full analysis"
  
  decline:
    description: "Decreasing mentions"
    velocity_range: [-80, -20]
    action: "Weekly review"
  
  exhausted:
    description: "Minimal mentions, <2 sources"
    velocity_range: [-100, -80]
    action: "Archive"

# Inflection Alert Thresholds
inflection_alerts:
  acceleration:
    yellow: 100   # 2x baseline velocity
    orange: 200   # 3x baseline velocity
    red: 400      # 5x baseline velocity
  
  sentiment_shift:
    threshold: 0.5  # Alert if sentiment changes by >0.5 in 12h
  
  dominance_shift:
    threshold: 0.15  # Alert if share of voice shifts by >15%
