# PIR Matching Configuration
matching:
  algorithm: "keyword_and_entity_cooccurrence"
  confidence_threshold: 0.6
  min_mentions_for_alert: 3
  time_window_hours: 24
  
# Alert Configuration
alerts:
  enabled: true
  channels:
    - "workspace_logs"
    - "daily_brief"
  severity_levels:
    critical: "velocity > 200% OR sentiment < -0.7"
    high: "velocity > 150% OR sentiment < -0.5"
    medium: "velocity > 100% OR sentiment < -0.3"
    low: "velocity > 50% OR sentiment < -0.1"
