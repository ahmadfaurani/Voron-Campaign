# Intensifiers (multiply sentiment)
intensifiers:
  very: 1.5
  extremely: 2.0
  highly: 1.8
  deeply: 1.7
  strongly: 1.6
  severely: 1.9
  dramatically: 1.8
  significantly: 1.5
  substantially: 1.5
  remarkably: 1.6
  exceptionally: 1.9
  overwhelmingly: 2.0
  completely: 1.8
  totally: 1.8
  utterly: 1.9
  absolutely: 1.8
  quite: 1.3
  rather: 1.3
  fairly: 1.2
  somewhat: 0.7
  slightly: 0.5
  marginally: 0.5
  minimally: 0.4

# Malaysian Political Context Rules
context_rules:
  # Party-specific framing
  party_framing:
    PKR:
      positive_context:
        - "unity"
        - "reform"
        - "leadership"
      negative_context:
        - "defection"
        - "crisis"
        - "faction"
    
    UMNO:
      positive_context:
        - "stability"
        - "tradition"
        - "strength"
      negative_context:
        - "internal conflict"
        - "leadership challenge"
        - "split"
    
    BERSAMA:
      positive_context:
        - "momentum"
        - "growth"
        - "alternative"
      negative_context:
        - "threat"
        - "uncertainty"
        - "unproven"
    
    DAP:
      positive_context:
        - "multicultural"
        - "progressive"
        - "reform"
      negative_context:
        - "divisive"
        - "extremist"
        - "controversial"
  
  # Event-specific sentiment adjustments
  event_adjustments:
    defection:
      originating_party: -0.5  # Negative for party losing member
      receiving_party: +0.3    # Positive for party gaining member
    resignation:
      default: -0.4  # Generally negative
    endorsement:
      default: +0.3  # Generally positive
    election_wins:
      winner: +0.5  # Positive for winner
      loser: -0.3   # Negative for loser
    scandal:
      default: -0.6  # Strongly negative
    policy_announcement:
      default: 0.0  # Neutral, depends on reception
    coalition_formation:
      default: +0.2  # Slightly positive (stability)
    coalition_collapse:
      default: -0.5  # Negative (instability)
  
  # Demographic context
  demographic_context:
    youth_voters:
      cost_of_living: -0.5  # Economic anxiety
      employment: -0.4
      education: +0.2
    
    rural_voters:
      subsidies: +0.3  # Positive when maintained
      development: +0.2
      neglect: -0.4
    
    urban_voters:
      infrastructure: +0.2
      congestion: -0.3
      housing: -0.4

