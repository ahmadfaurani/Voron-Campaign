# Collection Settings
collection:
  timeout_seconds: 30
  retry_attempts: 3
  retry_delay_seconds: 5
  content_filter: "main_content_only"
  exclude_patterns:
    - "advertisement"
    - "sidebar"
    - "related_stories"
    - "comments"
  include_patterns:
    - "headline"
    - "article_body"
    - "timestamp"
    - "author"
  language_priority:
    - "en"   # Primary
    - "ms"   # Secondary (majority language)
    - "zh"   # Chinese community
    - "ta"   # Tamil community

# Firecrawl Configuration
firecrawl:
  api_url: "http://localhost:3002/v2"
  timeout_ms: 30000
  formats:
    - "markdown"
  only_main_content: true
  proxy_used: "basic"
  multilingual_support: true

# Source Health Monitoring
health_check:
  enabled: true
  frequency: "every_6_hours"
  alert_threshold: "2_consecutive_failures"
  notification_channel: "workspace_logs"

# Media Cluster Summary
# =====================
# Public Broadcaster: Bernama (operational)
# Commercial TV: Media Prima, Astro AWANI (pending)
# Print + Digital: The Star, NST, BH, Sinar Harian (mixed)
# Digital-Native: Malaysiakini, FMT, The Vibes, MalaysiaNow, Malay Mail, The Edge (mixed)
# Regional: Daily Express, Borneo Post, TV Sarawak, New Sabah Times (mixed)
# Chinese Media: Sin Chew, China Press, Nanyang (pending)
# Tamil Media: Tamil Nesan (pending)
# Business: The Edge, Focus Malaysia (pending)
#
# Total Sources: 24 (5 operational, 19 pending test)
